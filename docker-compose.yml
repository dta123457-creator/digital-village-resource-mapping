version: '3.8'

services:
  # PostgreSQL Database with PostGIS extension
  postgres:
    image: postgis/postgis:16-3.4
    container_name: village-mapping-db
    environment:
      POSTGRES_USER: village_user
      POSTGRES_PASSWORD: village_password
      POSTGRES_DB: village_mapping
      POSTGRES_INITDB_ARGS: "-c TimeZone=UTC"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U village_user -d village_mapping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: village-mapping-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: village-mapping-api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://village_user:village_password@postgres:5432/village_mapping
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: village-mapping-frontend
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    environment:
      DATABASE_URL: postgresql://village_user:village_password@postgres:5432/village_mapping
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      - postgres
      - redis
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: village-mapping-network
